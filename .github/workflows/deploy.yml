name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required by the official GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        # --legacy-peer-deps: the Lovable config declares a peerOptional on a
        # nitro beta that npm's strict resolver rejects. This is the same mode
        # the committed lockfile was generated with.
        run: npm ci --legacy-peer-deps

      - name: Build (static SPA)
        run: npm run build

      - name: Prepare static output for GitHub Pages
        # The SPA build emits dist/client/_shell.html. GitHub Pages needs an
        # index.html at the served root and a 404.html fallback so client-side
        # routed deep links (e.g. /blog) resolve to the SPA shell. .nojekyll
        # stops Jekyll from stripping the _-prefixed and assets files.
        run: |
          cp dist/client/_shell.html dist/client/index.html
          cp dist/client/_shell.html dist/client/404.html
          touch dist/client/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
